<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Compliance de Fornecedores</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>Consulta de Fornecedores</h1>

    <input type="text" id="cnpj" placeholder="Digite o CNPJ">

    <button onclick="consultarFornecedor()">Consultar</button>

    <div id="resultado"></div>

    <h2>Fornecedores Salvos</h2>

    <button onclick="listarFornecedores()">Atualizar Lista</button>

    <table>

        <thead>

            <tr>

                <th>CNPJ</th>

                <th>Razão Social</th>

                <th>Situação</th>

                <th>Cidade</th>

            </tr>

        </thead>

        <tbody id="tabela-fornecedores"></tbody>

    </table>

</div>

<script src="script.js"></script>

</body>

</html>
